# Local development: Postgres + API. Không cần file .env.
# Chạy: docker compose -f docker-compose.dev.yml up -d --build
# API: http://localhost:8080

services:
  postgres:
    image: postgres:16-alpine
    container_name: ecommerce-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: ecommerce
      POSTGRES_PASSWORD: ecommerce
      POSTGRES_DB: ecommerce
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
      - ./migrations/0001_init.sql:/docker-entrypoint-initdb.d/0001_init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ecommerce -d ecommerce"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - app

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ecommerce-api-dev
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      APP_ENV: development
      HTTP_PORT: "8080"
      POSTGRES_DSN: "postgres://ecommerce:ecommerce@postgres:5432/ecommerce?sslmode=disable"
      JWT_SECRET: "dev-jwt-secret-min-32-chars-long"
      REDIS_ADDR: ""
      REDIS_PASSWORD: ""
    ports:
      - "8080:8080"
    networks:
      - app

volumes:
  postgres_dev_data:

networks:
  app:
    driver: bridge
